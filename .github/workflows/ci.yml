name: CI

# Build the app and run the unit-test suite on every push to main and every PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run if a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    env:
      PROJECT: "Done Pomodoro.xcodeproj"
      SCHEME: "Done Pomodoro"
      # Unit tests only — the UITests target is unimplemented boilerplate.
      TEST_TARGET: "Done PomodoroTests"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The app now targets iOS 26 (Liquid Glass), so CI needs an Xcode that
      # ships the iOS 26 SDK. Select the newest installed Xcode; if none beats
      # the default, fall back to it. Print versions + runtimes for diagnostics.
      - name: Select newest Xcode
        run: |
          set -euo pipefail
          NEWEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$NEWEST" ]; then
            echo "Selecting $NEWEST"
            sudo xcode-select -s "$NEWEST/Contents/Developer"
          fi
          xcodebuild -version
          echo "--- installed iOS runtimes ---"
          xcrun simctl list runtimes | grep -i ios || true

      # Pick a concrete iOS 26 simulator at runtime. The deployment target is
      # iOS 26, so the test destination must be an iOS 26 runtime — an older
      # runtime would fail to install the app.
      - name: Select an iOS 26 Simulator
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys;
          data=json.load(sys.stdin)['devices'];
          cands=[d for rt,ds in data.items() if 'iOS-26' in rt for d in ds if d['isAvailable'] and 'iPhone' in d['name']];
          print(cands[-1]['udid'] if cands else '')")
          if [ -z "$UDID" ]; then
            echo "::error::No available iOS 26 iPhone simulator on the runner (the app requires iOS 26)."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Selected simulator UDID: $UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build & Test
        run: |
          set -euo pipefail
          run_tests() {
            xcodebuild test \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
              -only-testing:"$TEST_TARGET" \
              -resultBundlePath TestResults.xcresult \
              CODE_SIGNING_ALLOWED=NO
          }
          # Pretty-print with xcbeautify if it's on the runner; otherwise raw.
          # Either way the real xcodebuild exit code (via pipefail) decides pass/fail.
          if command -v xcbeautify >/dev/null 2>&1; then
            set -o pipefail
            run_tests | xcbeautify --renderer github-actions
          else
            run_tests
          fi

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore

  # Design-token guard for the visual redesign (docs/redesign-plan.md #9).
  # Zero-dependency bash/grep, so it runs on cheap Linux — no Xcode needed.
  design-lint:
    name: Design-token lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run design-lint
        # Advisory until PR2: it reports newly introduced hardcoded styling
        # values but does NOT fail the build yet. Flip to "true" at the start
        # of PR2 — once the Phase-1 tokens have survived the task list and are
        # locked — to make new violations block CI.
        env:
          DESIGN_LINT_BLOCKING: "false"
        run: scripts/design-lint.sh
